name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/casa
            git fetch origin main
            git reset --hard origin/main
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
            docker image prune -f

      - name: Verifica saude da API
        run: |
          sleep 10
          for i in $(seq 1 12); do
            if curl -sf -m 5 https://colmeiaapp.duckdns.org/health | grep -q ok; then
              echo "API saudavel apos deploy"
              exit 0
            fi
            sleep 5
          done
          echo "API nao respondeu apos o deploy"
          exit 1
