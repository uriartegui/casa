name: Deploy API
run-name: Deploy API - production @ ${{ github.sha }}

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    name: Pre-deploy backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: casa
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: casa_ci
        options: >-
          --health-cmd "pg_isready -U casa -d casa_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_USER: casa
      DATABASE_PASSWORD: ci_password
      DATABASE_NAME: casa_ci
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build backend
        run: npm run build
      - name: Apply migrations on a clean database
        run: npm run migration:run
      - name: Run backend tests
        run: npm test

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://colmeiaapp.duckdns.org/health
    steps:
      - name: Publish deploy start summary
        run: |
          {
            echo "## Deploy API"
            echo ""
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| Ambiente | production |"
            echo "| API | https://colmeiaapp.duckdns.org |"
            echo "| Health check | https://colmeiaapp.duckdns.org/health |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Autor | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/casa
            git config http.version HTTP/1.1
            for attempt in 1 2 3; do
              if git fetch --prune origin main; then
                break
              fi
              if [ "$attempt" = "3" ]; then
                echo "git fetch failed after 3 attempts"
                exit 1
              fi
              echo "git fetch failed; retrying in 5s..."
              sleep 5
            done
            git reset --hard origin/main
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
            docker image prune -f

      - name: Verify API health
        run: |
          sleep 15
          for i in $(seq 1 24); do
            if curl -sf -m 5 https://colmeiaapp.duckdns.org/health | grep -q ok; then
              {
                echo ""
                echo "### Resultado"
                echo ""
                echo "Deploy concluido e API saudavel."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            sleep 5
          done
          {
            echo ""
            echo "### Resultado"
            echo ""
            echo "Deploy executado, mas a API nao respondeu ao health check."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Dump remote deploy diagnostics
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            cd /opt/casa
            echo "### docker compose ps"
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env ps
            echo ""
            echo "### api logs"
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env logs --tail=120 api
            echo ""
            echo "### caddy logs"
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env logs --tail=120 caddy
            echo ""
            echo "### db logs"
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env logs --tail=80 db
            echo ""
            echo "### listening ports"
            ss -tulpn | grep -E ':80|:443|:3000' || true
            echo ""
            echo "### local health through caddy"
            curl -i -m 5 http://localhost/health || true
