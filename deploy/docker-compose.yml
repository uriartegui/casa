services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Exposto apenas no localhost da VPS — acesso externo somente via túnel SSH.
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-casa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-casa}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ../backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-casa}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB:-casa}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no deploy/.env}
      BETTER_STACK_SOURCE_TOKEN: ${BETTER_STACK_SOURCE_TOKEN:-}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      SWAGGER_USER: ${SWAGGER_USER:-}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-}
      ENABLE_TEST_ALERTS: ${ENABLE_TEST_ALERTS:-false}
      TEST_ALERT_TOKEN: ${TEST_ALERT_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      API_DOMAIN: ${API_DOMAIN:?defina API_DOMAIN no deploy/.env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
