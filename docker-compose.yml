version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: casa_db
    environment:
      POSTGRES_USER: casa
      POSTGRES_PASSWORD: casa123
      POSTGRES_DB: casa
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
